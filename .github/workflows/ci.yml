name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # next lint is not available as a subcommand in Next.js 16; use test + typecheck until ESLint flat config is migrated.
      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck
